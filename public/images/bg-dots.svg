<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <!-- Soft fibrous ridges with slight horizontal grain -->
      <feTurbulence type="fractalNoise" baseFrequency="0.025 0.065" numOctaves="9" seed="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <!-- Gentle contrast boost to bring out ridges without harsh edges -->
      <feComponentTransfer in="grey" result="shaped">
        <feFuncR type="gamma" amplitude="1" exponent="1.3" offset="0.08"/>
        <feFuncG type="gamma" amplitude="1" exponent="1.3" offset="0.08"/>
        <feFuncB type="gamma" amplitude="1" exponent="1.3" offset="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="shaped" mode="multiply"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#ffffff" filter="url(#paper)"/>
</svg>
