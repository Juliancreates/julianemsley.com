<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">

      <!-- Large soft bumps — the "tooth" of the paper -->
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.038" numOctaves="4" seed="6" result="bumps"/>

      <!-- Fine horizontal fibres layered on top -->
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.13" numOctaves="7" seed="11" result="fibres"/>

      <!-- Blend the two noise layers -->
      <feMerge result="combined">
        <feMergeNode in="bumps"/>
        <feMergeNode in="fibres"/>
      </feMerge>

      <!-- Strip colour -->
      <feColorMatrix type="saturate" values="0" in="combined" result="grey"/>

      <!-- Push midtones toward white -->
      <feComponentTransfer in="grey" result="lifted">
        <feFuncR type="gamma" amplitude="0.22" exponent="1.0" offset="0.78"/>
        <feFuncG type="gamma" amplitude="0.22" exponent="1.0" offset="0.78"/>
        <feFuncB type="gamma" amplitude="0.22" exponent="1.0" offset="0.78"/>
      </feComponentTransfer>

      <!-- Multiply over white so only the shadows show through -->
      <feBlend in="SourceGraphic" in2="lifted" mode="multiply" result="paper"/>

      <!-- Fine grain layer -->
      <feTurbulence type="turbulence" baseFrequency="0.65" numOctaves="3" seed="2" result="grain"/>
      <feColorMatrix type="saturate" values="0" in="grain" result="greyGrain"/>
      <feComponentTransfer in="greyGrain" result="subtleGrain">
        <feFuncR type="linear" slope="0.16" intercept="0.88"/>
        <feFuncG type="linear" slope="0.16" intercept="0.88"/>
        <feFuncB type="linear" slope="0.16" intercept="0.88"/>
      </feComponentTransfer>
      <feBlend in="paper" in2="subtleGrain" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="#ffffff" filter="url(#paper)" opacity="0.3"/>
</svg>
